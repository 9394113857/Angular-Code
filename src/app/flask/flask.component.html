<div class="container">

  <!-- Loading -->
  <div *ngIf="isLoading" class="mob-table text-center">
    <p>Loading...</p>
  </div>

  <!-- Server Error -->
  <div *ngIf="hasServerError" class="mob-table text-center">
    <p class="text-danger"><strong>Error fetching data from the server</strong></p>
  </div>

  <!-- Main Table -->
  <div *ngIf="!isLoading && !hasServerError" class="mob-table">

    <div class="headers">
      <h2 class="table-title text-white">
        Mobile operations from backend FastAPI
      </h2>
      <button class="btn add" (click)="openForm()">
        Add Mobile
      </button>
    </div>

    <!-- No Data -->
    <div *ngIf="mobiles.length === 0" class="text-center mt-3">
      <p>No mobiles available.</p>
    </div>

    <!-- Table -->
    <table *ngIf="mobiles.length > 0" class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price (Rs)</th>
          <th>RAM</th>
          <th>Storage</th>
          <th></th>
          <th></th>
        </tr>
      </thead>

      <tbody class="text-center">
        <tr *ngFor="let mobile of mobiles">
          <td>{{ mobile.id }}</td>
          <td>{{ mobile.name }}</td>
          <td>{{ mobile.price }}</td>
          <td>{{ mobile.ram }}</td>
          <td>{{ mobile.storage }}</td>
          <td>
            <button class="btn btn-primary"
                    (click)="openForm(mobile)">
              Edit
            </button>
          </td>
          <td>
            <button class="btn btn-danger"
                    (click)="deleteMobile(mobile.id ?? null)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- FORM OVERLAY -->
  <div class="form-wrapper" *ngIf="showForm">
    <div class="mobile-form">

      <h2 class="text-center text-info">
        {{ formHeader }}
      </h2>

      <div class="group">
        <label>Name:</label>
        <input type="text"
               class="form-control"
               [(ngModel)]="mobileName">
      </div>

      <div class="group">
        <label>Price:</label>
        <input type="number"
               class="form-control"
               [(ngModel)]="price">
      </div>

      <div class="group">
        <label>RAM:</label>
        <input type="number"
               class="form-control"
               [(ngModel)]="ram">
      </div>

      <div class="group">
        <label>Storage:</label>
        <input type="number"
               class="form-control"
               [(ngModel)]="storage">
      </div>

      <div class="action">
        <button class="btn btn-danger"
                (click)="closeForm()">
          Cancel
        </button>

        <button class="btn btn-success"
                (click)="saveMobile()">
          Save
        </button>
      </div>

    </div>
  </div>

</div>
